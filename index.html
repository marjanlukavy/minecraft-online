<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Майнкрафт 2D</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="game"></canvas>

<div id="help">
  <b>A / D · ←→</b> — рух &nbsp;·&nbsp; <b>W / Space / ↑</b> — стрибок<br>
  На сходах: <b>W / ↑</b> — вгору &nbsp;·&nbsp; <b>S / ↓</b> — вниз<br>
  Заходь у будинок — стіни стануть прозорими 🏠
</div>
<div id="fps"></div>
<div id="netStatus"></div>

<div id="hotbar"></div>

<div id="invOverlay">
  <div id="invPanel">
    <h2>Інвентар</h2>
    <div class="invBody">
      <div class="invLeft">
        <div id="invGrid" class="grid"></div>
        <div class="sep"></div>
        <div id="invHotbar" class="grid"></div>
      </div>
      <div class="invRight">
        <h3>Крафт</h3>
        <div id="craftList"></div>
      </div>
    </div>
    <div class="hint">ЛКМ — узяти/покласти стак &nbsp;·&nbsp; ПКМ — половину/по одному &nbsp;·&nbsp; E / Esc — закрити</div>
  </div>
</div>

<div id="held"><canvas></canvas><div class="count"></div></div>

<div id="nameOverlay">
  <div id="namePanel">
    <h2>⛏️ Майнкрафт 2D — гра вдвох</h2>
    <p>Введи ім'я, яке бачитимуть інші гравці:</p>
    <input id="nameInput" type="text" maxlength="16" placeholder="Твоє ім'я"
           autocomplete="off" spellcheck="false">
    <button id="nameBtn">Грати ▶</button>
  </div>
</div>

<!-- Модулі гри (порядок підключення важливий) -->
<script src="js/config.js"></script>
<script src="js/items.js"></script>
<script src="js/world.js"></script>
<script src="js/daynight.js"></script>
<script src="js/inventory.js"></script>
<script src="js/crafting.js"></script>
<script src="js/player.js"></script>
<script src="js/mobs.js"></script>
<script src="js/render.js"></script>
<script src="js/house.js"></script>
<script src="js/input.js"></script>
<script src="js/net.js"></script>
<script src="js/main.js"></script>
</body>
</html>
